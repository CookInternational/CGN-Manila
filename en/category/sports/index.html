<body data-lang="en">
<div id="cgn-manila-header"></div>
<main id="main" class="cgn-main"><section class="page-card category-page"><div class="category-hero-mini" style="background-image:linear-gradient(90deg,rgba(7,23,47,.94),rgba(7,23,47,.38)),url('/assets/CGNSportsHighlights01.png')"><div><div class="hero-kicker">CGN Manila</div><h1>Sports</h1><p>Sports coverage from CGN Manila.</p></div></div><div id="category-list" class="grid"><div class="empty-state">Loading…</div></div></section></main>
<div id="cgn-manila-footer"></div>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  const catSlug="sports";
  const map={"world": "World", "politics": "Politics", "business": "Business", "markets": "Markets", "technology": "Technology", "entertainment": "Entertainment", "environment": "Environment", "energy": "Energy", "opinion": "Opinion", "local": "Local", "weather": "Weather", "sports": "Sports", "investigations": "Investigations", "special-reports": "Special Reports"};
  const imageMap={"world": "/assets/category/CGNWorld01.png", "politics": "/assets/category/CGNPolitics01.png", "business": "/assets/category/CGNBusiness01.jpeg", "markets": "/assets/category/CGNMarkets01.png", "technology": "/assets/category/CGNTechnology01.png", "entertainment": "/assets/category/CGNEntertainment01.png", "environment": "/assets/category/CGNEnvironment01.png", "energy": "/assets/category/CGNEnergy01.png", "opinion": "/assets/category/CGNOpinion01.png", "local": "/assets/category/CGNLocal01.png", "weather": "/assets/CGNWeatherBrief01.png", "sports": "/assets/CGNSportsHighlights01.png", "investigations": "/assets/CGNWebBanner01.png", "special-reports": "/assets/CGNWebBanner01.png"};
  const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  const articleUrl=a=>a&&a.canonical_url?new URL(a.canonical_url).pathname:'#';
  const img=a=>{const raw=(a&& (a.hero_image_url||a.image)||'').trim(); if(raw){const file=raw.split('/').pop(); for(const val of Object.values(imageMap)){if(val.endsWith(file)) return val;} return raw;} return imageMap[catSlug]||'/assets/CGNWebBanner01.png';};
  try{
    const arts=await CGNManila.fetchArticles(150);
    const selected=arts.filter(a=>a.category===map[catSlug]);
    const el=document.getElementById('category-list');
    el.innerHTML=selected.length?selected.map((a,i)=>`<article class="article-card ${i===0?'lead-card':''}"><a href="${esc(articleUrl(a))}"><img src="${esc(img(a))}" alt="" loading="lazy"></a><div class="article-card-body"><h3><a href="${esc(articleUrl(a))}">${esc(a.title||'')}</a></h3><p>${esc(a.summary||a.subtitle||'').slice(0,220)}</p><a class="read" href="${esc(articleUrl(a))}">Read more →</a></div></article>`).join(''):`<div class="empty-state">No published Manila stories are available yet.</div>`;
  }catch(e){document.getElementById('category-list').innerHTML='<div class="empty-state">'+esc(e.message)+'</div>';}
});
</script>
